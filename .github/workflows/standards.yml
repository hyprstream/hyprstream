name: Standards artifacts

on:
  push:
    branches: ["main"]
    paths:
      - 'docs/standards/**'
      - 'tools/check_standards.py'
      - 'tools/generate_standards.py'
      - '.github/workflows/standards.yml'
  pull_request:
    paths:
      - 'docs/standards/**'
      - 'tools/check_standards.py'
      - 'tools/generate_standards.py'
      - '.github/workflows/standards.yml'

permissions:
  contents: read

jobs:
  validate:
    name: Validate registries and RFCXML outputs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install exact xml2rfc version
        run: python3 -m pip install --disable-pip-version-check xml2rfc==3.34.0
      - name: Validate registries, obligations, and stale output
        run: python3 tools/check_standards.py --check-generated --xml2rfc xml2rfc
