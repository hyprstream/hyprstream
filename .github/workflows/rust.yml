name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
  merge_group:

env:
  CARGO_TERM_COLOR: always
  # sccache was removed (June 2026): on the GHA cache backend it delivered a ~3% hit
  # rate with ~40% of writes failing under concurrent load, and it barely caches the
  # librocksdb-sys/torch-sys C++ that dominates our build. rust-cache's target/ restore
  # covers those far better. See PR that introduced this change.
  CARGO_INCREMENTAL: 0

# Cancel superseded PR runs so a new push frees runners and reduces concurrent cache
# writers. merge_group (unique gh-readonly-queue ref) and push-to-main never cancel each
# other, so the merge gate and the cache-warming push always run to completion.
concurrency:
  group: rust-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install build dependencies
      run: sudo apt-get update && sudo apt-get install -y capnproto libsystemd-dev pkg-config libssl-dev

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy

    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2
      with:
        # dev profile / --all-targets — kept distinct from the release `build` key so the
        # two profiles don't overwrite each other's target/ artifacts.
        shared-key: rust-clippy
        # Only main writes the shared cache; PR and merge_group runs restore it. This is
        # what fixes the hit rate: concurrent runs all sharing one key raced on the GHA
        # single-writer reservation and every save failed ("Unable to reserve cache"), so
        # the cache was never populated. push-to-main (after each merge) refreshes it.
        save-if: ${{ github.ref == 'refs/heads/main' }}

    - name: Run Clippy
      run: cargo clippy --workspace --all-targets --features download-libtorch -- -D warnings

  deny:
    name: cargo-deny (bans + licenses)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install cargo-deny
      uses: taiki-e/install-action@v2
      with:
        tool: cargo-deny
    - name: Check bans
      # ZMQ crates are deny-listed in deny.toml (#138 complete). This gate must
      # be able to fail — do NOT add `|| true`.
      run: cargo deny check bans licenses

  wasm:
    name: WASM (browser client)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    # capnproto only — the wasm browser client (hyprstream-rpc) has no libtorch/systemd deps.
    - name: Install build dependencies
      run: sudo apt-get update && sudo apt-get install -y capnproto pkg-config

    - name: Install Rust toolchain (wasm32)
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-unknown-unknown

    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: rust-wasm
        save-if: ${{ github.ref == 'refs/heads/main' }}

    # Guards the browser/WebTransport build (#225/#226): getrandom wasm_js (Cargo.toml) +
    # the web_sys_unstable_apis rustflag for WebTransport. Catches wasm-only breakage the
    # native clippy/build jobs miss (e.g. the PQ-crypto getrandom regression).
    - name: Check wasm32 browser build
      run: cargo check --target wasm32-unknown-unknown -p hyprstream-rpc
      env:
        RUSTFLAGS: "--cfg=web_sys_unstable_apis"

  build:
    # MERGE GATE — not a per-PR-push check. The heavy build+test runs in the merge
    # queue (`merge_group`) against latest main + the PR, and on push to `main` — but
    # NOT on every PR push. PR review keeps the fast jobs (clippy/deny/wasm) for quick
    # feedback; `build` is the required check enforced by the `protection` ruleset's
    # merge queue. (Per-PR AppImage artifacts were dropped with the PR build; the
    # `appimage.yml` workflow still builds the AppImage on push to `main`.)
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: clippy  # Only build if clippy passes
    # Merge-gate backstop: fail before the merge queue's 120min timeout (ruleset
    # check_response_timeout_minutes) so a hang yields a definitive failure and the
    # queue keeps moving instead of timing out and kicking every queued PR. Healthy
    # build+test is ~90min (Build ~13m / Run tests ~76m), so 115 leaves margin.
    timeout-minutes: 115

    steps:
    - uses: actions/checkout@v4

    - name: Install build dependencies
      run: sudo apt-get update && sudo apt-get install -y capnproto libsystemd-dev pkg-config libssl-dev

    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2
      with:
        # release profile — distinct key from clippy's dev profile.
        shared-key: rust-build
        save-if: ${{ github.ref == 'refs/heads/main' }}

    - name: Build
      run: cargo build --release --verbose --features download-libtorch

    - name: Install cargo-nextest
      uses: taiki-e/install-action@nextest

    - name: Run tests (nextest, per-test timeout)
      # nextest enforces the per-TEST slow-timeout from .config/nextest.toml
      # ([profile.ci]): a single deadlocked test is SIGKILLed after ~3min and fails
      # fast, instead of stalling the job until the 115min job / 120min queue
      # timeout. The cap is per-test on purpose — the legit suite is long (~76min),
      # so a per-step timeout could not tell a hang from healthy runtime.
      run: cargo nextest run --release --profile ci --features download-libtorch

    - name: Run doctests
      # nextest does not run doctests; keep them in the merge gate.
      run: cargo test --release --doc --features download-libtorch
