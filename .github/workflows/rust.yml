name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
  merge_group:

# id-token: write lets jobs mint an OIDC token to assume the sccache S3 role
# (AWS_SCCACHE_ROLE_ARN). No long-lived AWS secrets live in the repo — the role
# is assumed per-run with a short-lived credential that sccache's S3 backend reads
# from the standard AWS env vars exported by configure-aws-credentials.
permissions:
  contents: read
  id-token: write

env:
  CARGO_TERM_COLOR: always
  # sccache S3 backend: shared across CI runs AND local devs, keyed on compiler
  # inputs. Replaces the GHA-cache sccache (3% hit rate, 10GB explosion, write
  # races) AND Swatinem/rust-cache. Bucket objects expire after 24h (lifecycle).
  RUSTC_WRAPPER: sccache
  SCCACHE_BUCKET: ${{ vars.AWS_SCCACHE_BUCKET }}
  SCCACHE_REGION: ${{ vars.AWS_SCCACHE_REGION }}
  CARGO_INCREMENTAL: 0
  # Pinned arm64 rust-builder image (built by build-image.yml): toolchain +
  # libtorch + capnproto + sccache + cargo-nextest + git-lfs + the pinned Rust
  # toolchain's components/targets, all baked. Bump this digest deliberately after
  # a builder-image publish so CI inputs stay reproducible (a follow-up automates
  # the bump — see build-image.yml).
  BUILDER_IMAGE: ghcr.io/hyprstream/rust-builder-arm64@sha256:aa9feb1c8432ebf4583fcfc9c8236c371cb050f489c4d0882a7f2d8c8589120e

# The fast lint jobs (clippy, wasm) run on the self-hosted Graviton (arm64)
# runners and drive the build through `podman run` against the prebuilt
# rust-builder image (rust + capnproto + clang + libtorch). We DELIBERATELY do
# NOT use a job-level `container:` — the runner's native container support wants
# a Docker-API socket at /var/run/docker.sock, which the rootless-podman golden
# AMI does not expose (a `container:` job fails with `statfs
# /var/run/docker.sock: permission denied`). Driving `podman run` from host
# steps sidesteps that entirely and is the same pattern proven in
# graviton-build-validate.yml.
#
# Two wins over GitHub-hosted ubuntu-latest: (1) same-region as the sccache S3
# bucket, so cache transfer is free (ubuntu-latest pulled it over the internet —
# ~560GB/mo of S3 DataTransfer-Out); (2) libtorch comes from the image
# (/opt/libtorch), so there is no x86 `download-libtorch` (no aarch64 zip exists).
#
# AWS creds from the OIDC step are passed into the container by name (`-e VAR`
# with no value forwards the host value) so the image's sccache reaches S3.
#
# The merge-gate `build` job runs the same way (#1011): self-hosted Graviton,
# inside the rust-builder container, default features with the image's aarch64
# libtorch (no `download-libtorch`) — see its inline note.
jobs:
  clippy:
    name: Clippy
    runs-on: [self-hosted, linux, arm64, graviton, hyprstream-merge-gate]
    # The last successful run took ~6 minutes including image pull. Keep a
    # bounded backstop for the shared runner without giving a stalled lint job
    # the merge-gate's 90-minute budget.
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v4
      with:
        persist-credentials: false

    - name: Configure AWS credentials (OIDC → sccache S3)
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ vars.AWS_SCCACHE_ROLE_ARN }}
        aws-region: ${{ vars.AWS_SCCACHE_REGION }}

    - name: Pull builder image
      run: podman pull "$BUILDER_IMAGE"

    - name: Run Clippy (in rust-builder container)
      run: |
        podman run --rm \
          -v "$PWD":/build:Z -w /build \
          -e RUSTC_WRAPPER=sccache -e SCCACHE_BUCKET -e SCCACHE_REGION \
          -e AWS_ACCESS_KEY_ID -e AWS_SECRET_ACCESS_KEY -e AWS_SESSION_TOKEN \
          -e AWS_REGION -e AWS_DEFAULT_REGION \
          -e LIBTORCH=/opt/libtorch -e LD_LIBRARY_PATH=/opt/libtorch/lib \
          -e LIBTORCH_BYPASS_VERSION_CHECK=1 -e OPENSSL_NO_VENDOR=1 \
          -e CARGO_INCREMENTAL=0 -e CARGO_TERM_COLOR=always \
          "$BUILDER_IMAGE" \
          bash -euo pipefail -c '
            cargo clippy --workspace --all-targets -- -D warnings
            sccache --show-stats
          '

  deny:
    name: cargo-deny (bans + licenses)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install cargo-deny
      uses: taiki-e/install-action@v2
      with:
        tool: cargo-deny
    - name: Check bans
      # ZMQ crates are deny-listed in deny.toml (#138 complete). This gate must
      # be able to fail — do NOT add `|| true`.
      # No compilation here (metadata only), arch-independent, no S3 — stays on
      # the free GitHub-hosted runner.
      run: |
        unset RUSTC_WRAPPER
        cargo deny check bans licenses

  wasm:
    name: WASM (browser client)
    runs-on: [self-hosted, linux, arm64, graviton, hyprstream-merge-gate]
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v4
      with:
        persist-credentials: false

    - name: Configure AWS credentials (OIDC → sccache S3)
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ vars.AWS_SCCACHE_ROLE_ARN }}
        aws-region: ${{ vars.AWS_SCCACHE_REGION }}

    - name: Pull builder image
      run: podman pull "$BUILDER_IMAGE"

    # Guards the browser/WebTransport build (#225/#226): getrandom wasm_js (Cargo.toml) +
    # the web_sys_unstable_apis rustflag for WebTransport. Catches wasm-only breakage the
    # native clippy/build jobs miss (e.g. the PQ-crypto getrandom regression).
    - name: Check wasm32 browser build (in rust-builder container)
      run: |
        podman run --rm \
          -v "$PWD":/build:Z -w /build \
          -e RUSTC_WRAPPER=sccache -e SCCACHE_BUCKET -e SCCACHE_REGION \
          -e AWS_ACCESS_KEY_ID -e AWS_SECRET_ACCESS_KEY -e AWS_SESSION_TOKEN \
          -e AWS_REGION -e AWS_DEFAULT_REGION \
          -e CARGO_INCREMENTAL=0 -e CARGO_TERM_COLOR=always \
          -e RUSTFLAGS='--cfg=web_sys_unstable_apis' \
          "$BUILDER_IMAGE" \
          bash -euo pipefail -c '
            cargo check --target wasm32-unknown-unknown -p hyprstream-rpc
            sccache --show-stats
          '

  build:
    # MERGE GATE — not a per-PR-push check. The heavy build+test runs in the merge
    # queue (`merge_group`) against latest main + the PR, and on push to `main` — but
    # NOT on every PR push. PR review keeps the fast jobs (clippy/deny/wasm) for quick
    # feedback; `build` is the required check enforced by the `protection` ruleset's
    # merge queue. (Per-PR AppImage artifacts were dropped with the PR build; the
    # `appimage.yml` workflow still builds the AppImage on push to `main`.)
    if: github.event_name != 'pull_request'
    # MERGE GATE runs on the self-hosted Graviton (arm64) fleet, INSIDE the
    # prebuilt rust-builder container via `podman run` — the same layer clippy +
    # wasm use (#1011). Two consequences of arm64-in-container vs the old
    # ubuntu-latest job:
    #   1. libtorch comes from the image (/opt/libtorch, the aarch64 pip wheel);
    #      there is NO `download-libtorch` feature (no aarch64 libtorch zip
    #      exists). Default features are otherwise unchanged, so coverage
    #      (systemd/kata-vm/nspawn/otel/gittorrent/xet) matches the former gate.
    #   2. all tooling is baked into the image — build deps (capnproto,
    #      libsystemd-dev), sccache, cargo-nextest, git-lfs, and the pinned
    #      toolchain (components + wasm targets) — so the job installs no TOOLING
    #      over the network at runtime (cargo still fetches workspace/crate deps,
    #      served by sccache-S3 + crates.io). It only sets up the non-root ci user.
    runs-on: [self-hosted, linux, arm64, graviton, hyprstream-merge-gate]
    needs: clippy  # Only build if clippy passes
    # Backstop below the fleet's 150-min reaper cap (metal reaper_max_lifetime_
    # minutes) so a genuine hang fails definitively rather than being reaped
    # mid-run. A COLD-cache build+test can approach this; once sccache (S3) is
    # warm, real runs finish well under the merge queue's 120-min
    # check_response_timeout. The nextest ci-test profile avoids release ThinLTO
    # on test binaries to keep the suite bounded.
    timeout-minutes: 140

    steps:
    - uses: actions/checkout@v4
      with:
        persist-credentials: false

    - name: Configure AWS credentials (OIDC → sccache S3)
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ vars.AWS_SCCACHE_ROLE_ARN }}
        aws-region: ${{ vars.AWS_SCCACHE_REGION }}

    - name: Pull builder image
      run: podman pull "$BUILDER_IMAGE"

    # Full merge-gate build + test in ONE container so sccache stays warm and the
    # bind-mounted target/ persists across build → wasm-guests → nextest →
    # doctests. Mirrors the clippy/wasm invocation (libtorch + sccache-to-S3 from
    # the image); AWS creds forward by name (`-e VAR` with no value passes the
    # host value) so the in-image sccache reaches the same-region S3 bucket.
    - name: Build + test (release, in rust-builder container)
      run: |
        podman run --rm \
          -v "$PWD":/build:Z -w /build \
          -e RUSTC_WRAPPER=sccache -e SCCACHE_BUCKET -e SCCACHE_REGION \
          -e SCCACHE_IDLE_TIMEOUT=0 \
          -e AWS_ACCESS_KEY_ID -e AWS_SECRET_ACCESS_KEY -e AWS_SESSION_TOKEN \
          -e AWS_REGION -e AWS_DEFAULT_REGION \
          -e LIBTORCH=/opt/libtorch -e LD_LIBRARY_PATH=/opt/libtorch/lib \
          -e LIBTORCH_BYPASS_VERSION_CHECK=1 -e OPENSSL_NO_VENDOR=1 \
          -e CARGO_INCREMENTAL=0 -e CARGO_TERM_COLOR=always \
          "$BUILDER_IMAGE" \
          bash -euo pipefail -c '
            # cargo-nextest, git-lfs, the wasm targets and clippy are baked into the
            # builder image (BUILDER_IMAGE, Dockerfile builder-cpu-arm64) — no runtime
            # installs here. Only set up the NON-ROOT user: several fail-closed tests
            # assert a write to a read-only dir is rejected, but root bypasses file
            # permissions, so they pass only as non-root (the old ubuntu-latest gate
            # ran non-root). Make the toolchain usable by ci and hand it the workspace.
            useradd -m ci
            chmod a+rx /root
            chmod -R a+rwX /root/.cargo /root/.rustup
            chown -R ci:ci /build
            runuser -u ci -- bash -euo pipefail /build/.github/scripts/graviton-build-test.sh
          '
