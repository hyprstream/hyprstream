name: Build AppImage

on:
  schedule:
    # Full distributable builds are deliberately off the merge path.
    - cron: '30 3 * * *'
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

env:
  CARGO_TERM_COLOR: always
  LIBTORCH_VERSION: "2.10.0"
  # sccache S3 backend (OIDC role assumed per-run). Replaces SCCACHE_GHA_ENABLED,
  # which spammed the 10GB repo cache with thousands of tiny objects for no
  # cross-run gain (fresh runner each run). Intra-run variant reuse still works
  # (all variants compile identical Rust — only libtorch differs — so variants
  # 2..N reuse variant 1's crates from local disk); S3 adds cross-run sharing.
  RUSTC_WRAPPER: sccache
  SCCACHE_BUCKET: ${{ vars.AWS_SCCACHE_BUCKET }}
  SCCACHE_REGION: ${{ vars.AWS_SCCACHE_REGION }}
  CARGO_INCREMENTAL: 0

jobs:
  # Build all supported x86_64 variants sequentially on a single runner. This
  # keeps the large libtorch payloads and Cargo target on one disk.
  build-x86_64:
    name: Build x86_64 AppImages (sequential)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            capnproto \
            libssl-dev \
            libsystemd-dev \
            pkg-config \
            build-essential

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Configure AWS credentials (OIDC → sccache S3)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_SCCACHE_ROLE_ARN }}
          aws-region: ${{ vars.AWS_SCCACHE_REGION }}

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-${{ runner.os }}-sequential-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-sequential-
            cargo-${{ runner.os }}-

      - name: Extract version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          [[ "$VERSION" == "$GITHUB_REF_NAME" ]] && VERSION="dev"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build CPU AppImage
        run: |
          ./appimage/build-appimage.sh build cpu --version ${{ steps.version.outputs.version }}
          ./appimage/build-appimage.sh stage cpu
          ./appimage/build-appimage.sh clean cpu

      - name: Upload CPU AppImage
        uses: actions/upload-artifact@v4
        with:
          name: appimage-cpu
          path: appimage/output/*-cpu-*.AppImage
          retention-days: 5

      - name: Build CUDA 12.8 AppImage
        run: |
          ./appimage/build-appimage.sh build cuda128 --version ${{ steps.version.outputs.version }}
          ./appimage/build-appimage.sh stage cuda128
          ./appimage/build-appimage.sh clean cuda128

      - name: Upload CUDA 12.8 AppImage
        uses: actions/upload-artifact@v4
        with:
          name: appimage-cuda128
          path: appimage/output/*-cuda128-*.AppImage
          retention-days: 5

      - name: Build CUDA 13.0 AppImage
        run: |
          ./appimage/build-appimage.sh build cuda130 --version ${{ steps.version.outputs.version }}
          ./appimage/build-appimage.sh stage cuda130
          ./appimage/build-appimage.sh clean cuda130

      - name: Upload CUDA 13.0 AppImage
        uses: actions/upload-artifact@v4
        with:
          name: appimage-cuda130
          path: appimage/output/*-cuda130-*.AppImage
          retention-days: 5

      - name: Build ROCm 7.1 AppImage
        run: |
          ./appimage/build-appimage.sh build rocm71 --version ${{ steps.version.outputs.version }}
          ./appimage/build-appimage.sh stage rocm71
          ./appimage/build-appimage.sh clean rocm71

      - name: Upload ROCm 7.1 AppImage
        uses: actions/upload-artifact@v4
        with:
          name: appimage-rocm71
          path: appimage/output/*-rocm71-*.AppImage
          retention-days: 5

      - name: Build Universal AppImage
        run: |
          ./appimage/build-appimage.sh build universal --version ${{ steps.version.outputs.version }}

      - name: Upload Universal AppImage
        uses: actions/upload-artifact@v4
        with:
          name: appimage-universal
          path: appimage/output/hyprstream-${{ steps.version.outputs.version }}-x86_64.AppImage
          retention-days: 5

      - name: Show sccache stats
        run: sccache --show-stats

  # Native arm64 packaging. Upstream publishes arm64 CPU libtorch through the
  # PyTorch wheel, but not CUDA/ROCm archives; build the supported CPU image in
  # the prebuilt Graviton builder so Rust and libtorch stay architecture-native.
  build-arm64-cpu:
    name: Build arm64 CPU AppImage
    runs-on: [self-hosted, linux, arm64, graviton, hyprstream-merge-gate]
    timeout-minutes: 150
    env:
      BUILDER_IMAGE: ghcr.io/hyprstream/rust-builder-arm64@sha256:aa9feb1c8432ebf4583fcfc9c8236c371cb050f489c4d0882a7f2d8c8589120e

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Pull arm64 builder image
        run: podman pull "$BUILDER_IMAGE"

      - name: Build arm64 CPU AppImage in the native builder
        run: |
          podman run --rm \
            -v "$PWD":/build:Z -w /build \
            -e HYPRSTREAM_APPIMAGE_ARCH=aarch64 \
            -e HYPRSTREAM_LIBTORCH_DIR=/opt/libtorch \
            -e GITHUB_REF_NAME \
            -e APPIMAGE_EXTRACT_AND_RUN=1 \
            -e OPENSSL_NO_VENDOR=1 \
            -e LIBTORCH=/opt/libtorch -e LD_LIBRARY_PATH=/opt/libtorch/lib \
            -e LIBTORCH_BYPASS_VERSION_CHECK=1 \
            -e CARGO_INCREMENTAL=0 -e CARGO_TERM_COLOR=always \
            "$BUILDER_IMAGE" \
            bash -euo pipefail -c '
              apt-get update
              apt-get install -y --no-install-recommends squashfs-tools
              version="${GITHUB_REF_NAME#v}"
              [[ "$version" == "$GITHUB_REF_NAME" ]] && version=dev
              ./appimage/build-appimage.sh build cpu --version "$version"
            '

      - name: Upload arm64 CPU AppImage
        uses: actions/upload-artifact@v4
        with:
          name: appimage-arm64-cpu
          path: appimage/output/*-cpu-aarch64.AppImage
          retention-days: 5

  # Create GitHub Release with all AppImages (tags only)
  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-x86_64, build-arm64-cpu]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all AppImages
        uses: actions/download-artifact@v4
        with:
          pattern: appimage-*
          path: appimages/
          merge-multiple: true

      - name: List AppImages
        run: |
          echo "AppImages to release:"
          ls -lh appimages/

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Generate checksums
        run: |
          cd appimages
          sha256sum *.AppImage > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Hyprstream v${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            appimages/*.AppImage
            appimages/SHA256SUMS.txt
            install.sh
          body: |
            ## Quick Install

            ```bash
            curl -fsSL https://github.com/hyprstream/hyprstream/releases/download/v${{ steps.version.outputs.version }}/install.sh | bash
            ```

            Or non-interactive:
            ```bash
            curl -fsSL https://github.com/hyprstream/hyprstream/releases/download/v${{ steps.version.outputs.version }}/install.sh | bash -s -- --auto
            ```

            ## AppImage Downloads

            | File | Description |
            |------|-------------|
            | `hyprstream-${{ steps.version.outputs.version }}-x86_64.AppImage` | Universal (auto-detects GPU) |
            | `hyprstream-${{ steps.version.outputs.version }}-cpu-x86_64.AppImage` | CPU only |
            | `hyprstream-${{ steps.version.outputs.version }}-cuda128-x86_64.AppImage` | NVIDIA CUDA 12.8 |
            | `hyprstream-${{ steps.version.outputs.version }}-cuda130-x86_64.AppImage` | NVIDIA CUDA 13.0 |
            | `hyprstream-${{ steps.version.outputs.version }}-rocm71-x86_64.AppImage` | AMD ROCm 7.1 |
            | `hyprstream-${{ steps.version.outputs.version }}-cpu-aarch64.AppImage` | ARM64 CPU only |

            ### Manual Install

            ```bash
            # Download and make executable
            chmod +x hyprstream-${{ steps.version.outputs.version }}-x86_64.AppImage

            # Run (auto-detects GPU)
            ./hyprstream-${{ steps.version.outputs.version }}-x86_64.AppImage server

            # Override backend detection
            HYPRSTREAM_BACKEND=cuda130 ./hyprstream-${{ steps.version.outputs.version }}-x86_64.AppImage server

            # List available backends (universal only)
            ./hyprstream-${{ steps.version.outputs.version }}-x86_64.AppImage --list-backends
            ```

            ### GPU Requirements

            - **CUDA 12.8**: NVIDIA driver 535+
            - **CUDA 13.0**: NVIDIA driver 555+
            - **ROCm 7.1**: AMD GPU with ROCm 7.x installed

      - name: Cleanup artifacts
        uses: geekyeggo/delete-artifact@v4
        with:
          name: appimage-*
