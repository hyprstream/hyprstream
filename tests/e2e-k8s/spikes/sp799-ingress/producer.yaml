# Producer stand-in for the #799 spike. Replace STANDIN_IMAGE with the real
# hyprstream streaming image (or a quic/wtransport echo stand-in) at deploy time.
#
# The stand-in contract (consumed by run.sh):
#   - listens QUIC/WebTransport on :443/udp
#   - serves the leaf cert PEM at http://:80/cert (out-of-band pin computation)
#   - (iroh path) writes its iroh NodeId to /run/hyprstream/iroh-nodeid
apiVersion: apps/v1
kind: Deployment
metadata:
  name: producer
  labels: {app: producer}
spec:
  replicas: 1
  selector: {matchLabels: {app: producer}}
  template:
    metadata: {labels: {app: producer}}
    spec:
      containers:
      - name: producer
        image: STANDIN_IMAGE
        imagePullPolicy: IfNotPresent
        ports:
        - {name: quic, containerPort: 443, protocol: UDP}
        - {name: http, containerPort: 80, protocol: TCP}
        readinessProbe:
          httpGet: {path: /cert, port: 80}
          initialDelaySeconds: 2
          periodSeconds: 3
---
# HTTP port for out-of-band cert fetch (NOT the stream plane).
apiVersion: v1
kind: Service
metadata: {name: producer-http}
spec:
  selector: {app: producer}
  ports: [{name: http, port: 80, targetPort: 80}]
