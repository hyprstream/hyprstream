# UDP LoadBalancer exposure for the #799 direct-QUIC path. Requires metallb
# (installed by up.sh from the podman kind bridge subnet). A UDP-capable LB is
# the part Gateway API / HTTPRoute has no story for — this is the SP3 gap.
apiVersion: v1
kind: Service
metadata:
  name: producer
  annotations:
    metallb.io/allow-shared-ip: "sp799-quic"
spec:
  type: LoadBalancer
  selector: {app: producer}
  ports:
  - {name: quic, port: 443, targetPort: 443, protocol: UDP}
