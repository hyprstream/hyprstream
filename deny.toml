# cargo-deny configuration for the hyprstream workspace.
#
# CI runs `cargo deny check bans` on every PR to catch regressions.
# The ZMQ bans below are currently `warn` level — change to `deny` when
# #138 (ZMQ transport removal) completes and the deps are gone.

[graph]
targets = []

[bans]
# Lint level for when multiple versions of the same crate are detected.
multiple-versions = "warn"
# Lint level for crates that are explicitly banned.
wildcards = "allow"

# ZMQ removal exit criterion (#138 / #173):
# These are banned to enforce the "no ZMQ" invariant post-cutover.
deny = [
    { name = "zmq", reason = "ZMQ fully removed in #138 — no new zmq deps" },
    { name = "zmq-sys", reason = "ZMQ fully removed in #138" },
    { name = "tmq", reason = "ZMQ fully removed in #138" },
    { name = "zeromq-src", reason = "ZMQ fully removed in #138" },
]

[licenses]
# Minimum confidence threshold for license detection.
confidence-threshold = 0.8
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "MPL-2.0",
    "Zlib",
    "OpenSSL",
    "BSL-1.0",            # Boost Software License (permissive)
    "Unlicense",          # public domain equivalent (permissive)
    "bzip2-1.0.6",        # bzip2-sys: permissive BSD-like, FSF-free
    "CDLA-Permissive-2.0", # Community Data License Agreement (permissive data license — webpki-roots CA certs)
]

# hyprstream itself is dual-licensed MIT OR AGPL-3.0-only (first-party).
# Allow AGPL only for the root binary crate — not as a blanket allow.
[[licenses.exceptions]]
name = "hyprstream"
version = "*"
allow = ["MIT", "AGPL-3.0-only"]

# systemd/libsystemd-sys are LGPL + GCC exception.
# The GCC exception permits non-copyleft software to dynamically link against LGPL libraries
# without triggering the copyleft requirement; hyprstream links libsystemd dynamically.
[[licenses.exceptions]]
name = "systemd"
version = "*"
allow = ["LGPL-2.1-or-later WITH GCC-exception-2.0"]

[[licenses.exceptions]]
name = "libsystemd-sys"
version = "*"
allow = ["LGPL-2.1-or-later WITH GCC-exception-2.0"]

# huggingface/xet-core (tag git-xet-v0.2.0) internal workspace crates don't
# declare `license` in their per-crate Cargo.toml; the root repo is Apache-2.0.
# Clarify each crate explicitly so cargo-deny knows the license is asserted.
[[licenses.clarify]]
name = "api_client"
version = "*"
expression = "Apache-2.0"
license-files = []

[[licenses.clarify]]
name = "cas_client"
version = "*"
expression = "Apache-2.0"
license-files = []

[[licenses.clarify]]
name = "cas_object"
