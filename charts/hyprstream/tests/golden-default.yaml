        app.kubernetes.io/name: hyprstream
        app.kubernetes.io/instance: hyprstream
        app.kubernetes.io/component: oai
    spec:
      serviceAccountName: hyprstream
      securityContext:
        fsGroup: 65532
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: oai
          image: ghcr.io/hyprstream/hyprstream:0.1.0
          imagePullPolicy: IfNotPresent
          args:
            - service
            - start
            - oai
            - --foreground
          envFrom:
            - configMapRef:
                name: hyprstream-config
          env:
            - name: HYPRSTREAM__OAI__HOST
              value: "0.0.0.0"
            - name: HYPRSTREAM__OAI__PORT
              value: "6789"
            - name: HYPRSTREAM__QUIC__SERVER_NAME
              value: "hyprstream-oai"
          ports:
            - name: http
              containerPort: 6789
              protocol: TCP
          readinessProbe:
            failureThreshold: 6
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 65532
          volumeMounts:
            - name: data
              mountPath: /var/lib/hyprstream
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hyprstream-data
