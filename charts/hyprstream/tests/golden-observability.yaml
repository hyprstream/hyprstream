metadata:
  name: hyprstream-otel-collector
  labels:
    helm.sh/chart: hyprstream-0.1.0
    app.kubernetes.io/name: hyprstream
    app.kubernetes.io/instance: hyprstream
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: otel-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hyprstream
      app.kubernetes.io/instance: hyprstream
      app.kubernetes.io/component: otel-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hyprstream
        app.kubernetes.io/instance: hyprstream
        app.kubernetes.io/component: otel-collector
      annotations:
        # Roll the collector when its rendered config changes.
        checksum/config: 909245b4b6619b5dbacb3cebbf79052cd757b686e5372e2fef494d3e61d8ce3d
    spec:
      serviceAccountName: hyprstream
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
      containers:
        - name: otel-collector
          image: "otel/opentelemetry-collector-contrib:0.128.0"
          imagePullPolicy: IfNotPresent
          args:
            - --config=/conf/collector.yaml
          ports:
            - name: otlp-grpc
              containerPort: 4317
              protocol: TCP
            - name: otlp-http
              containerPort: 4318
              protocol: TCP
            - name: prometheus
              containerPort: 8889
              protocol: TCP
            - name: health
              containerPort: 13133
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: health
            initialDelaySeconds: 10
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: config
              mountPath: /conf
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: hyprstream-otel-collector-config
