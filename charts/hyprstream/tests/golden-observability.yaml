apiVersion: apps/v1
kind: Deployment
metadata:
  name: hyprstream-discovery
  labels:
    helm.sh/chart: hyprstream-0.1.0
    app.kubernetes.io/name: hyprstream
    app.kubernetes.io/instance: hyprstream
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: discovery
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hyprstream
      app.kubernetes.io/instance: hyprstream
      app.kubernetes.io/component: discovery
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hyprstream
        app.kubernetes.io/instance: hyprstream
        app.kubernetes.io/component: discovery
    spec:
      serviceAccountName: hyprstream
      securityContext:
        fsGroup: 65532
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: discovery
          image: ghcr.io/hyprstream/hyprstream:0.1.0
          imagePullPolicy: IfNotPresent
          args:
            - service
            - start
            - discovery
            - --foreground
          envFrom:
            - configMapRef:
                name: hyprstream-config
          env:
            - name: HYPRSTREAM__DISCOVERY__QUIC_PORT
              value: "7002"
            - name: HYPRSTREAM__QUIC__SERVER_NAME
              value: "hyprstream-discovery"
            - name: OTEL_SERVICE_NAME
              value: "hyprstream-discovery"
          ports:
            - name: quic
              containerPort: 7002
              protocol: UDP
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 65532
          volumeMounts:
            - name: data
              mountPath: /var/lib/hyprstream
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hyprstream-data
