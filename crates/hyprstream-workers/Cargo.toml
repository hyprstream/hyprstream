[package]
name = "hyprstream-workers"
version = "0.1.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Isolated workload execution using Kata Containers with CRI-aligned APIs"

[dependencies]
# Workspace crates
hyprstream-rpc = { path = "../hyprstream-rpc" }
# CRI v1 (runtime.v1) tonic-generated client bindings (#510): the CriBackend
# drives an external, already-running CRI runtime service (containerd's CRI
# plugin, or CRI-O) over CRI gRPC — the same protocol kubelet speaks — rather
# than hyprstream embedding/driving a runtime itself. Pinned to 0.10.0, the
# last release generated against tonic 0.12 / prost 0.13 (the versions this
# workspace already pins); 0.11.0 moved to tonic 0.14 / prost 0.14, which
# would pull a second incompatible tonic/prost/hyper stack into the graph for
# no functional gain here. Optional — gated behind the `cri` feature so the
# default build doesn't assume an external CRI runtime is present.
k8s-cri = { version = "=0.10.0", optional = true }
# Kubernetes API-server backend (#781, epic #778): the `K8sBackend` drives the
# cluster API server via kube-rs, emitting real Pods/Jobs (scheduler-placed,
# quota'd, kubectl-visible) — the client/orchestrator role, distinct from the
# CRI-socket `CriBackend`. Consumed through `hyprstream-k8s` (the CRD-schema
# crate) so the `kube`/`k8s-openapi` versions + the single `v1_*` feature are
# pinned in exactly one place. Optional — gated behind the `k8s` feature so the
# default build assumes no cluster.
hyprstream-k8s = { path = "../hyprstream-k8s", optional = true }
tonic = { workspace = true, optional = true }
# UDS connector plumbing for dialing the CRI runtime's Unix socket
# (`/run/containerd/containerd.sock` et al) via `tonic::transport::Endpoint`.
tower = { version = "0.4", optional = true, default-features = false }
hyper-util = { version = "0.1", optional = true, features = ["tokio"] }
# In-process WebAssembly sandbox substrate (#505 P1): the embedded wasmtime
# `Sandbox` (capability-only Linker, fuel/epoch DoS bounds). This is the
# consolidated crate formerly named `hyprstream-wasm` (renamed to
# `hyprstream-workers-wasmtime` in the quality reset). Optional — pulled in only under the
# `wasm` feature so the default/nspawn build stays lean and torch-free
# (hyprstream-workers-wasmtime depends only on wasmtime/rand/vfs/rpc, never tch/libtorch).
hyprstream-workers-wasmtime = { path = "../hyprstream-workers-wasmtime", optional = true }
hyprstream-rpc-derive = { path = "../hyprstream-rpc-derive" }
hyprstream-service = { path = "../hyprstream-service" }
# Shared scheduling substrate (#628): filter→rank→select + SelectionReport<C> +
# RejectionReason. `selection.rs` composes backend selection on these instead of
# a bespoke explain shape.
hyprstream-discovery = { path = "../hyprstream-discovery" }
hyprstream-vfs = { path = "../hyprstream-vfs" }
# Wire-faithful 9P2000.L server: serves a Subject-scoped `Arc<dyn Mount>` over a
# Unix socket for the native Wanix guest to dial (#506, `runtime::wanix_workload`).
hyprstream-9p = { path = "../hyprstream-9p" }
# FS-A's vhost-user-fs server (native-only): serves a composed per-sandbox
# Namespace to a Cloud Hypervisor guest. FS-D wires the compose→serve→attach
# flow. Native-only (vhost-user-fs/fuse-backend-rs transport are Linux-only).
# Gated behind `kata-vm`: only the VM/CH ShareFs path attaches this server.
hyprstream-vfs-server = { path = "../hyprstream-vfs-server", optional = true }
hyprstream-workers-tcl = { path = "../hyprstream-workers-tcl" }

# Async runtime
tokio = { workspace = true }
tokio-util = { workspace = true }
async-trait = { workspace = true }
futures = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
capnp = { workspace = true }

# Error handling
anyhow = { workspace = true }
thiserror = { workspace = true }

# Logging
tracing = { workspace = true }

# Utilities
uuid = { workspace = true }
chrono = { workspace = true }
dashmap = { workspace = true }
walkdir = { workspace = true }
parking_lot = { workspace = true }
glob = { workspace = true }

# System utilities (also used by runtime/pool.rs, virtiofs.rs, events/endpoints.rs)
nix = { workspace = true }
which = { workspace = true }

# Compile-time backend registry (sandbox backends self-register via inventory::submit!)
inventory = { workspace = true }

# Service management utilities (merged into hyprstream-rpc)

# D-Bus integration (optional, for container D-Bus proxy)
zbus = { version = "4", features = ["tokio"], optional = true }

# Nydus libraries (Dragonfly-native blob fetching) — gated behind `oci-image`.
# These power the universal mountable OCI/RAFS image filesystem service
# (`ImageFs` = OverlayFs-over-in-process-RAFS, an `FsMount`). Any backend that
# composes an image filesystem needs these; the host-root backends do not.
#
# Crates.io cleanup investigated 2026-06-30 (re-checking a 2026-06-26 pass
# that concluded these 4 crates simply weren't published — they ARE now):
# nydus-api, nydus-storage, nydus-rafs, nydus-utils, nydus-builder, and
# nydus-service are all published on crates.io, but as two cohorts that
# can't be mixed (dragonflyoss only republished part of the set in their
# 2026-02-28 wave):
#   cohort A (= nydus git tag v2.4.0): nydus-api 0.4.0, nydus-storage 0.7.1,
#     nydus-rafs 0.4.0, nydus-builder 0.2.0, nydus-utils 0.5.0,
#     nydus-service 0.4.0 — all require fuse-backend-rs "^0.13.1".
#   cohort B (= nydus git tag v2.4.4): nydus-api 0.4.1, nydus-storage 0.7.2,
#     nydus-rafs 0.4.1, nydus-utils 0.5.1 require fuse-backend-rs "^0.14.0".
#     nydus-service has no cohort-B release (still 0.4.0, "^0.13.1") so
#     cohort B has no usable nydus-service at all.
# Cohort A looks adoptable in isolation (matches hyprstream-vfs's existing
# fuse-backend-rs = "0.13" pin), BUT: this workspace's kata-hypervisor git
# dependency (kata-containers tag 3.31.0) transitively requires
# `nydus-api = "0.4.1"` and `fuse-backend-rs = "0.14.0"` via
# dragonball -> dbs-virtio-devices (see kata-containers
# src/dragonball/dbs_virtio_devices/Cargo.toml). Cargo unifies same-named
# registry (crates.io) packages workspace-wide regardless of which crate
# requests them, so taking nydus-api from crates.io at ANY version forces
# cargo to pick a single nydus-api for the whole graph — `cargo
# generate-lockfile` fails outright if we try to pin nydus-api to cohort A
# (0.4.0) while kata-hypervisor's transitive closure demands 0.4.1, and if
# we instead take cohort B (0.4.1, satisfying kata) then nydus-rafs/
# nydus-storage must also move to cohort B, which forces fuse-backend-rs to
# 0.14 — and that in turn would require bumping hyprstream-vfs's
# fuse-backend-rs (its `Layer`/`FileSystem` traits must be the literal same
# types nydus-rafs's `Rafs` implements) AND hyprstream-vfs-server's whole
# vhost-user-fs virtio transport stack (vhost 0.11->0.15, vm-memory
# 0.14.1->0.17.1 exact, virtio-queue 0.12->0.17, vmm-sys-util 0.12.1->0.15,
# per fuse-backend-rs 0.14.0's own Cargo.toml) in lockstep — a much larger,
# separately-scoped change with no way to verify it functionally in this
# environment. (NB: hyprstream-workers' own git nydus-api and the
# kata-hypervisor-transitive crates.io nydus-api are never unified with
# each other today only because they come from two different Cargo
# *sources* — git vs registry — not because the versions are compatible;
# switching our nydus-api to the registry source is what collapses that
# separation and surfaces the conflict.)
#
# Net: a published-crates.io version exists for each individual nydus crate,
# but no published combination is simultaneously (a) mutually compatible
# among the 6 nydus crates and (b) compatible with the pre-existing
# kata-hypervisor transitive requirements and (c) compatible with
# hyprstream-vfs's fuse-backend-rs 0.13 pin without a much larger,
# out-of-scope vhost/vm-memory/virtio-queue bump in hyprstream-vfs-server.
# Staying on git is the correct call until either dragonflyoss republishes
# nydus-service against fuse-backend-rs 0.14, or hyprstream-vfs-server's
# virtio transport stack is separately bumped to match. Pinned to the exact
# commit for tag v2.4.0 (not the floating tag) for reproducibility.
nydus-api = { git = "https://github.com/dragonflyoss/nydus", rev = "5a9d42d8", optional = true }
nydus-storage = { git = "https://github.com/dragonflyoss/nydus", rev = "5a9d42d8", optional = true, features = [
    "backend-registry",
    "backend-localfs",
] }
# FS-B0: in-process RAFS bootstrap builder. TarballBuilder converts pulled OCI
# layer tarballs into a RAFS bootstrap (.meta) + dedup data blobs, no external
# nydus-image binary required.
nydus-builder = { git = "https://github.com/dragonflyoss/nydus", rev = "5a9d42d8", optional = true }
nydus-rafs = { git = "https://github.com/dragonflyoss/nydus", rev = "5a9d42d8", optional = true }
nydus-utils = { git = "https://github.com/dragonflyoss/nydus", rev = "5a9d42d8", optional = true }

# Phase 2: VM Runtime (nydus-service for virtiofs). Pinned to the exact
# commit for tag v2.4.0 (not the floating tag) — see the nydus-service note
# above for why crates.io can't be used yet.
nydus-service = { git = "https://github.com/dragonflyoss/nydus", rev = "5a9d42d8", optional = true }
# 0.13 to unify with nydus (`nydus-rafs` v2.4.0 builds against 0.13.1): FS-B
# (#363) wraps the in-process RAFS `Rafs` as an overlay lower, so its `Layer`
# type must match `hyprstream-vfs`'s `BoxedLayer`.
fuse-backend-rs = { version = "0.13", optional = true }

# Minimal HTTP for manifest fetching only (blobs go through nydus-storage)
reqwest = { version = "0.11", default-features = false, features = ["json", "rustls-tls"] }

# Hashing & encoding
sha2 = "0.10"
hex = "0.4"
base64 = "0.21"

# Crypto (for secure event publisher)
ed25519-dalek = { workspace = true }
curve25519-dalek = { workspace = true }
blake3 = { workspace = true }
rand = { workspace = true }
zeroize = { workspace = true }

# Kata Containers runtime-rs (hypervisor abstraction) — the VM toolchain only.
# Gated behind `kata-vm` (which implies `oci-image` for the RAFS image service
# kata serves via virtio-fs). The image filesystem service itself no longer
# requires these.
kata-hypervisor = { git = "https://github.com/kata-containers/kata-containers", tag = "3.31.0", package = "hypervisor", features = ["cloud-hypervisor"], optional = true }
kata-types = { git = "https://github.com/kata-containers/kata-containers", tag = "3.31.0", optional = true }
kata-sys-util = { git = "https://github.com/kata-containers/kata-containers", tag = "3.31.0", optional = true }
ch-config = { git = "https://github.com/kata-containers/kata-containers", tag = "3.31.0", optional = true }
# kata-agent ttrpc/protobuf wire types (CreateContainerRequest, ExecProcessRequest,
# WaitProcessRequest/Response, …) — the SAME crate `kata-hypervisor` already pulls
# in transitively (with the `async` ttrpc feature enabled), vendored verbatim from
# upstream kata-containers rather than hand-rolled. Pinned to the same git tag so
# the message types match what a real `kata-agent` at this version speaks.
protocols = { git = "https://github.com/kata-containers/kata-containers", tag = "3.31.0", features = ["async", "with-serde"], optional = true }
ttrpc = { version = "0.8", features = ["async"], optional = true }
# protobuf::MessageField is used directly when building agent ttrpc requests
# (CreateContainerRequest.OCI, ExecProcessRequest.process, …); pinned to the
# same version `protocols` itself depends on (3.7.2 per its Cargo.toml).
protobuf = { version = "3.7", optional = true }
# Raw AF_VSOCK socket() syscall support (CID/port dialing) — used for the
# `vsock://<cid>:<port>` scheme (Firecracker/Dragonball convention). Cloud
# Hypervisor itself uses *hybrid* vsock (a Unix socket + `CONNECT <port>`
# handshake, see kata_agent::sock), which needs no extra crate, but we
# support both schemes for parity with upstream kata-containers' own
# `runtime-rs/crates/agent/src/sock` dialer.
vsock = { version = "0.5", optional = true }

[features]
default = []
# Universal mountable OCI/RAFS image filesystem service (#633, spine of #508).
# Compiles the `image` module — `RafsStore` (OCI pull + RAFS CAS) and `ImageFs`
# (an `FsMount` = OverlayFs over an in-process RAFS lower + per-sandbox writable
# upper) — independent of any VM toolchain. "Root" is a mount position, not a
# type: an `ImageFs` mounted at `/` is the root purely because the namespace
# recipe mounted it there. Any backend can compose this (#632).
oci-image = [
    "dep:nydus-api",
    "dep:nydus-storage",
    "dep:nydus-builder",
    "dep:nydus-rafs",
    "dep:nydus-utils",
    "dep:nydus-service",
    "dep:fuse-backend-rs",
    # FS-A vhost-user-fs server: the transport that serves the composed VFS
    # namespace (image Mount + injected mounts) to a guest. NOT VM-specific, so
    # it lives on `oci-image`, not `kata-vm`.
    "dep:hyprstream-vfs-server",
]
# Kata/Cloud-Hypervisor VM backend (#518: the granular per-`BackendType`
# feature). Implies `oci-image` (kata composes the image filesystem service
# into a namespace and serves it to its guest via virtio-fs) and adds the VM
# toolchain plus the kata-agent vsock/ttrpc client (kata hypervisor + CH
# config + agent RPC). Opt-in so casual users who only want the lightweight
# `systemd-nspawn` backend don't compile the VM stack. When this feature is
# off, `BackendType::Kata` selection and CRI image ops return a clean runtime
# error rather than failing to compile. `kata-vm` (below) is the backward-
# compat convenience alias for this feature.
kata = [
    "oci-image",
    "dep:kata-hypervisor",
    "dep:kata-types",
    "dep:kata-sys-util",
    "dep:ch-config",
    "dep:protocols",
    "dep:ttrpc",
    "dep:protobuf",
    "dep:vsock",
]
# Backward-compat convenience alias (#518): the coarse `kata-vm` bundle (#347)
# becomes a thin alias for the granular `kata` feature. Existing
# `--features kata-vm` invocations keep working unchanged; `kata` is the
# canonical per-`BackendType` name going forward.
kata-vm = ["kata"]
# systemd-nspawn lightweight-container backend (#518: the granular per-
# `BackendType` feature). Compiles in `NspawnBackend` and registers it as the
# lowest-isolation auto-selectable tier (priority 10). Torch-free and needs no
# new dependencies (only the already-present `which`/`nix`/`tokio` process
# plumbing), so it just gates the module. Opt-in like every other backend so a
# build can pick exactly its backend set (casual = `wasm`+`nspawn`; server =
# `kata`+`oci`+`cri`). When off, `nspawn` selection fails closed (the backend
# simply isn't registered).
nspawn = []
# In-process WebAssembly sandbox backend (#505 P2). Compiles in `WasmBackend`
# and the `hyprstream-workers-wasmtime` wasmtime substrate it consumes. A native in-process
# sibling under the same `SandboxBackend` seam: no VM, no subprocess — a wasmtime
# guest bound to a `Subject`, fuel/epoch DoS-bounded. Opt-in so the default build
# doesn't vendor wasmtime; stays torch-free either way. When off, `wasm`
# selection fails closed (the backend simply isn't registered).
wasm = ["dep:hyprstream-workers-wasmtime"]
# Rootless OCI container backend (#346, Worker GA epic #341 / taxonomy #508).
# Compiles in `OciBackend`, a subprocess sibling of nspawn that drives a rootless
# OCI runtime (podman by default; the runtime binary is configurable) via CLI
# shell-out — user-namespaced containers from an OCI image, threading the full CRI
# PodSandboxConfig (name/labels/annotations/resources/security) into the
# invocation. Torch-free and needs no new dependencies (only the already-present
# `which`/`nix`/`tokio` process plumbing), so it just gates the module. Opt-in so
# the lean build doesn't assume a container runtime is installed. When off, `oci`
# selection fails closed (the backend simply isn't registered).
oci = []
# CRI-client sandbox backend (#510, Worker GA epic #341 / taxonomy #508).
# Compiles in `CriBackend`, a tonic gRPC *client* of an external, already-running
# CRI runtime service (containerd's CRI plugin, or CRI-O) — the kubelet role,
# not an embedded runtime. This is the generic "any CRI-compliant runtime"
# compatibility seam (and, incidentally, a way to get Kata via Kubernetes
# `RuntimeClass` on a containerd host without hyprstream embedding kata-agent
# itself — see `KataBackend`/`kata-vm` for the embedded path, which this does
# NOT replace). Opt-in: the lean build doesn't assume a CRI socket exists on
# the host. When off, `cri` selection fails closed (the backend simply isn't
# registered).
cri = ["dep:k8s-cri", "dep:tonic", "dep:tower", "dep:hyper-util"]
# Kubernetes API-server sandbox backend (#781, epic #778). Compiles in
# `K8sBackend`, a kube-rs client that creates real Pod/Job objects against the
# cluster API server (scheduler-placed, quota'd, kubectl-visible) — hyprstream
# as orchestrator/client, NOT the kubelet-facing CRI contract (`CriBackend`
# drives a node's CRI socket instead). Pulls the `k8s`-gated live-client path of
# `hyprstream-k8s` (kube client + runtime + ws for exec). Opt-in: the lean build
# assumes no cluster. Explicit-name-only when on (handing a workload to a
# cluster is an auth-surface decision `"auto"` must never make); when off, `k8s`
# selection fails closed (the backend simply isn't registered).
k8s = ["dep:hyprstream-k8s", "hyprstream-k8s/k8s"]
# Enable Dragonball built-in VMM support (alternative to cloud-hypervisor).
# Implies `kata` (via the `kata-vm` alias) since it tunes the kata hypervisor
# abstraction.
dragonball = ["kata-vm", "kata-hypervisor/dragonball"]
# Enable D-Bus bridge for container access to host D-Bus services
dbus = ["dep:zbus"]
# Systemd integration (socket activation, service units)
systemd = ["dbus", "hyprstream-rpc/systemd"]

[build-dependencies]
capnpc = { workspace = true }
capnp = { workspace = true }
serde_json = { workspace = true }
hyprstream-rpc-build = { workspace = true }

[dev-dependencies]
tokio-test = { workspace = true }
tempfile = { workspace = true }
# F3 (#761) admission-config TOML round-trip regression test.
toml = "0.8"
# FS-B0 RAFS bootstrap builder tests: synthesize small OCI layer tarballs.
tar = "0.4"
flate2 = "1"
# FS-D down-adapter test: S_IFMT/S_IFDIR constants when driving the FileSystem.
libc = "0.2"

[lints]
workspace = true
