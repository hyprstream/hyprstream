[package]
name = "hyprstream"
version = "0.5.0"
edition.workspace = true
description = "Agentic Infrastructure"
documentation = "https://docs.rs/hyprstream"
readme = "README.md"
license = "MIT OR AGPL-3.0-only"
exclude = [
    "**/*.pyc",
    "**/__pycache__/",
]
repository.workspace = true

[lib]
name = "hyprstream_core"
path = "src/lib.rs"
doctest = true

[[bin]]
name = "hyprstream"
path = "src/bin/main.rs"


[dependencies]
# Arrow and DataFusion dependencies removed - focused on ML inference only
bytes.workspace = true
futures.workspace = true
tokio.workspace = true
tonic.workspace = true
async-trait.workspace = true
tokio-util.workspace = true
serde.workspace = true
serde_json.workspace = true
subsecond.workspace = true
json-threat-protection.workspace = true
nix.workspace = true
users.workspace = true
rlimit.workspace = true
tracing-subscriber.workspace = true

# ADBC dependencies removed - focused on ML inference only

# Configuration
config.workspace = true
toml.workspace = true
serde_yaml.workspace = true
git2.workspace = true  # Still needed by git2db internally
git2db = { path = "../git2db", features = ["overlayfs"] }  # High-level git library with overlayfs
cas-serve = { path = "../cas-serve" }  # Content-addressed store reconstruction (getBlob #432)
hyprstream-rpc = { path = "../hyprstream-rpc" }
hyprstream-util = { path = "../hyprstream-util" }  # Generic shared primitives (TtlCache, etc.)
moq-net.workspace = true  # moq-lite streaming for cross-process subscriber (M2b)
ml-dsa = { workspace = true }  # ML-DSA-65 — always compiled (runtime CryptoPolicy selects PQ). See M3 #152.
hyprstream-rpc-std = { path = "../hyprstream-rpc-std" }  # Standard service schemas + clients
hyprstream-discovery = { path = "../hyprstream-discovery" }  # Service discovery
hyprstream-pds = { path = "../hyprstream-pds" }  # atproto PDS record store: DAG-CBOR + MST + signed commit + CAR proof (#392/#431)
hyprstream-service = { path = "../hyprstream-service" }  # Service orchestration
hyprstream-rpc-derive = { path = "../hyprstream-rpc-derive" }  # RPC code generation proc macros
hyprstream-flight = { path = "../hyprstream-flight" }  # Flight SQL server and client
hyprstream-metrics = { path = "../hyprstream-metrics" }  # Metrics storage (for RegistryClient trait)
hyprstream-workers = { path = "../hyprstream-workers" }  # Worker runtime (Kata containers)
hyprstream-vfs = { path = "../hyprstream-vfs" }  # VFS namespace (Mount trait)
hyprstream-9p = { path = "../hyprstream-9p" }  # 9P codec + Kata translator (Backend, Translator)
hyprstream-workers-tcl = { path = "../hyprstream-workers-tcl" }  # Tcl shell (TclMount, TclCommand)
hyprstream-workers-python = { path = "../hyprstream-workers-python" }  # Python shell (PythonMount, PyCommand)
inventory.workspace = true  # Service factory registration
gittorrent = { workspace = true, optional = true }  # P2P transport
clap.workspace = true
inquire = "0.7"
tracing.workspace = true
tracing-opentelemetry = { workspace = true, optional = true }
opentelemetry = { workspace = true, optional = true }
opentelemetry_sdk = { workspace = true, optional = true }
opentelemetry-otlp = { workspace = true, optional = true }
opentelemetry-semantic-conventions = { workspace = true, optional = true }
opentelemetry-stdout = { workspace = true, optional = true }
parking_lot.workspace = true
num_cpus.workspace = true
once_cell.workspace = true  # For global GitService singleton
dirs = "5"  # User directory paths for CLI

rmcp = { version = "0.14", features = ["server", "macros", "transport-io", "transport-streamable-http-server"] }
http = "1"  # HTTP types (request::Parts) for MCP identity extraction

tracing-log.workspace = true
tracing-appender.workspace = true
tui-logger = { version = "0.18", default-features = false }
log = "0.4"
bincode.workspace = true
tokio-stream.workspace = true
hex.workspace = true
chrono.workspace = true
async-stream.workspace = true
anyhow.workspace = true
sha2.workspace = true  # SHA256 validation for LFS files
hmac.workspace = true  # HMAC for authenticated stream chunks
daemonize.workspace = true
prost.workspace = true
rcgen.workspace = true  # Self-signed TLS cert generation for QUIC
rustls.workspace = true  # TLS runtime (ring crypto provider for axum-server)
rustls-pemfile.workspace = true  # PEM file parsing for TLS certs
rustls-acme.workspace = true  # ACME (Let's Encrypt / step-ca) automatic cert provisioning
zeroize.workspace = true  # Zeroing private key material on drop
time = "0.3"  # Datetime types for certificate validity

# HTTP socket activation (systemd)
listenfd = { version = "1.0", optional = true }

# ML dependencies
thiserror.workspace = true
rayon.workspace = true  # Parallel processing for tensor operations
memmap2.workspace = true
rand.workspace = true
tch = { git = "https://github.com/hyprstream/tch-rs", branch = "hyprstream" }
bitsandbytes-sys = { path = "../bitsandbytes-sys", optional = true }  # KV cache quantization

# Candle ML Framework - REMOVED: Fully migrated to Tch (PyTorch Rust bindings)
# candle-core = "0.9.1"
# candle-nn = "0.9.1"
# candle-transformers = "0.9.1"
# candle-examples = "0.9.1"
tokenizers.workspace = true
safetensors.workspace = true
image.workspace = true
regex.workspace = true
minijinja.workspace = true

# Runtime Integration Dependencies
# llama-cpp-2 = "0.1.67"          # REMOVED: Replaced by Tch (PyTorch) inference
# mistralrs dependencies commented out during Candle migration
# mistralrs = { path = "../mistral.rs/mistralrs" }
# mistralrs-core = { path = "../mistral.rs/mistralrs-core" }
# hf-hub removed - using Git for all model downloads

uuid.workspace = true
automerge = "0.5"  # CRDT collaborative editing
capnp.workspace = true  # Cap'n Proto runtime
capnp-futures.workspace = true  # Cap'n Proto async support
glob.workspace = true
walkdir.workspace = true
reqwest.workspace = true
jsonwebtoken = { workspace = true }
notify = { version = "7", default-features = false, features = ["macos_kqueue"] }
libc = "0.2"  # For system calls in overlay2 driver
reflink-copy = "0.1"  # COW file copying (reflink when available)
hyprstream-containedfs.workspace = true  # Path-contained filesystem operations
rocksdb = "0.23"  # User credential store (RocksDbUserStore)
fred = { version = "9", optional = true }  # Async Redis/Valkey client (ValkeyUserStore, ValkeyTokenStore)
hyprstream-tui = { path = "../hyprstream-tui" }  # Setup wizard TUI (WizardBackend trait + WizardApp)
hyprstream-compositor = { path = "../hyprstream-compositor" }  # Pure TUI compositor (chrome state machine)
waxterm = { path = "../waxterm", features = ["avt"] }  # Terminal abstraction for TUI rendering
ratatui = { version = "0.30", default-features = false }  # TUI framework for pane buffers
vte = "0.13"  # VT100/ANSI escape sequence parser for TUI pane ingestion

[target.'cfg(target_os = "linux")'.dependencies]
lru.workspace = true  # LRU cache for model caching and Git repository handles
dashmap.workspace = true  # Concurrent HashMap for thread-safe repository caching
bitflags.workspace = true  # Capability flags for archetype detection
casbin = "2"  # Access control library for RBAC/ABAC
indicatif.workspace = true              # Progress bars
fastrand.workspace = true                # Fast random number generation for sampling
rand.workspace = true                    # Cryptographic random for OAuth auth codes
xdg.workspace = true                     # XDG Base Directory specification
blake3.workspace = true                  # Fast cryptographic hashing for checksums
ciborium.workspace = true                # Canonical CBOR for tamper-evident audit records (#677 Fu6)
tempfile.workspace = true                # Temporary files for model conversion
base64.workspace = true                  # JWT token encoding
ed25519-dalek.workspace = true           # JWT Ed25519 signatures
p256.workspace = true                    # ES256 DPoP verification (atproto interop)
keyring = { version = "3", features = ["linux-native"] }  # OS keyring — Linux keyutils
curve25519-dalek.workspace = true        # Ristretto255 DH for stream authentication
hkdf.workspace = true                    # HKDF key derivation
bs58 = "0.5"                             # Base58 encoding for device fingerprints
subtle.workspace = true                  # Constant-time operations
ring = "0.17"                            # TLS endorsement signing (key-type-agnostic)

# HTTP API dependencies
# `ws` feature: 9P-over-WebSocket export (H1a / #764) on the existing server.
axum = { workspace = true, features = ["ws"] }
axum-server.workspace = true
tower-http.workspace = true
url.workspace = true
urlencoding.workspace = true
shellexpand.workspace = true

# macOS/iOS: Keychain via apple-native
[target.'cfg(any(target_os = "macos", target_os = "ios"))'.dependencies]
keyring = { version = "3", features = ["apple-native"] }

# Windows: Credential Manager via windows-native
[target.'cfg(target_os = "windows")'.dependencies]
keyring = { version = "3", features = ["windows-native"] }

# FreeBSD/OpenBSD: DBus Secret Service (requires libdbus-1-dev + a running daemon)
[target.'cfg(any(target_os = "freebsd", target_os = "openbsd"))'.dependencies]
keyring = { version = "3", features = ["sync-secret-service", "crypto-rust"] }

[features]
default = ["gittorrent", "xet", "systemd", "otel", "kata-vm"]
cuda = []
valkey = ["dep:fred"]  # Enable Valkey/Redis-backed user and token stores
bnb = ["dep:bitsandbytes-sys"]  # Enable bitsandbytes KV cache quantization (requires compatible ROCm/CUDA)
xet = ["git2db/xet-storage"]  # Enable XET large file storage
otel = ["dep:tracing-opentelemetry", "dep:opentelemetry", "dep:opentelemetry_sdk", "dep:opentelemetry-otlp", "dep:opentelemetry-semantic-conventions", "dep:opentelemetry-stdout"]
gittorrent = ["dep:gittorrent", "git2db/gittorrent-transport"]  # Enable P2P model sharing via gittorrent transport
download-libtorch = ["tch/download-libtorch"]
overlayfs = ["git2db/overlayfs"]  # Enable overlayfs-backed worktrees (delegated to git2db)
systemd = ["hyprstream-rpc/systemd", "hyprstream-service/systemd", "hyprstream-workers/systemd", "dep:listenfd"]  # Systemd integration (socket activation, service units)
oci-image = ["hyprstream-workers/oci-image"]  # Universal mountable OCI/RAFS image filesystem service (ImageFs, an FsMount); composable by any backend (#633)
kata-vm = ["hyprstream-workers/kata-vm", "oci-image"]  # Kata/Cloud-Hypervisor VM worker backend; implies oci-image (kata serves it via virtio-fs). In default; drop for an nspawn-only build
experimental = ["hyprstream-compositor/experimental"]  # EXPERIMENTAL: Enable service/worker panels, git write operations
pq-hybrid = []  # NO-OP alias: PQ primitives always compiled; Classical/Hybrid selected at runtime. See M3 #152.

[build-dependencies]
capnpc.workspace = true  # Cap'n Proto schema compiler
capnp.workspace = true   # Cap'n Proto runtime for schema parsing
serde_json.workspace = true  # JSON output for metadata
hyprstream-rpc-build.workspace = true  # Shared annotation extraction

[dev-dependencies]
criterion.workspace = true
proptest.workspace = true  # S5 #571 M2: differential faithfulness property tests
tempfile.workspace = true
tokio-stream.workspace = true
# Test-only: iroh substrate types used by `tests/policy_over_iroh.rs`.
iroh.workspace = true
rand.workspace = true
# Test-only: drive the xet axum Router via `ServiceExt::oneshot` (auth-reject test).
tower = { version = "0.5", features = ["util"] }
# Test-only: WebSocket client for the 9P-over-WS attach round-trip (H1a / #764).
tokio-tungstenite = "0.24"

[lints]
workspace = true
