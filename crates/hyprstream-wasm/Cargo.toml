[package]
name = "hyprstream-wasm"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Embedded wasmtime host for the #505 untrusted-Python capability sandbox (build-viability spike)"

# Workspace member (host target). It does NOT depend on tch/libtorch, so it builds
# without LIBTORCH. Build/test scoped:
#   cargo build -p hyprstream-wasm
#   cargo test  -p hyprstream-wasm

# NB: this crate intentionally does NOT add `[lints] workspace = true`. Lint
# inheritance is opt-in, so the workspace's deny-by-default panic/print lints do
# not apply — this spike uses unwrap/expect/panic freely in tests. P1 will reinstate.

[dependencies]
# Pinned exact: wasmtime 46.0.1 (latest stable as of 2026-06-29). The fuel/epoch
# API spellings recorded in FINDINGS.md are specific to this major.
wasmtime = "=46.0.1"
anyhow = "1"
rand = "0.8"

# Canonical VFS seam (#483 P2). hyprstream-vfs -> hyprstream-rpc; NEITHER pulls
# tch/torch (verified: only the top-level `hyprstream` crate links libtorch), so
# `cargo build -p hyprstream-wasm` stays torch-free. We use:
#   * hyprstream_rpc::Subject  — the CANONICAL caller identity (replaces the
#     crate-local Subject newtype).
#   * hyprstream_vfs::{Namespace, Mount, Fid, Stat, DirEntry, MountError, ...}
#     and spawn_vfs_proxy / VfsRequest / VfsOp — the real proxy seam.
hyprstream-vfs = { path = "../hyprstream-vfs" }
hyprstream-rpc = { path = "../hyprstream-rpc" }
# The proxy reply channel is std::sync::mpsc; the proxy task needs a tokio runtime.
tokio = { version = "1", features = ["sync", "rt", "rt-multi-thread"] }
async-trait = "0.1"
# `/lang/python` mount fid state uses parking_lot::Mutex for interior mutability
# through `&Fid` (same pattern as the native mount).
parking_lot = "0.12"

[dev-dependencies]
anyhow = "1"
tokio = { version = "1", features = ["rt", "rt-multi-thread", "macros", "sync"] }
parking_lot = "0.12"
